<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Striker Sprint: World Cup Final</title>
    <style>
        body { 
            text-align: center; font-family: 'Segoe UI', sans-serif; background: #121212; color: white; 
            margin: 0; overflow: hidden; touch-action: manipulation;
        }
        canvas { 
            background: #2e7d32; display: block; margin: 10px auto; 
            border: 3px solid #ffffff; border-radius: 8px; 
            max-width: 95%; height: auto; touch-action: none;
        }
        .ui-box { background: #333; padding: 8px; border-radius: 10px; display: inline-block; margin: 5px; border: 1px solid #555; font-size: 14px; }
        #flagSelector { font-size: 45px; cursor: pointer; margin-top: 10px; display: flex; flex-wrap: wrap; justify-content: center; }
        .flag-btn { margin: 10px; transition: transform 0.2s; }
        .flag-btn:hover { transform: scale(1.3); }
        .instruction { font-size: 20px; color: #FFD700; margin-top: 15px; font-weight: bold; }
        #leaderboard { margin-top: 10px; font-size: 14px; color: #ccc; }
        .controls-hint { font-size: 12px; color: #aaa; margin-bottom: 5px; }
    </style>
</head>
<body>
    <h2 style="margin: 10px 0;">🏆 STRIKER SPRINT 🏆</h2>
    
    <div id="setupMenu">
        <div class="instruction">👇 CHOOSE YOUR COUNTRY 👇</div>
        <div id="flagSelector">
            <span class="flag-btn" onclick="selectCountry('BR')">🇧🇷</span>
            <span class="flag-btn" onclick="selectCountry('AR')">🇦🇷</span>
            <span class="flag-btn" onclick="selectCountry('FR')">🇫🇷</span>
            <span class="flag-btn" onclick="selectCountry('DE')">🇩🇪</span>
            <span class="flag-btn" onclick="selectCountry('IT')">🇮🇹</span>
            <span class="flag-btn" onclick="selectCountry('CA')">🇨🇦</span>
        </div>
        <div id="leaderboard"></div>
    </div>

    <div id="gameUI" style="display:none;">
        <div class="controls-hint">PC: ARROWS | MOBILE: TAP LEFT (JUMP) / RIGHT (SHOOT)</div>
        <canvas id="gameCanvas" width="800" height="300"></canvas>
        <div class="ui-box" id="teamLabel"></div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let score = 0;
        let highscores = JSON.parse(localStorage.getItem("strikerLeaderboard")) || [0, 0, 0];
        let gameSpeed = 6, isGameOver = false, gameStarted = false, frameCount = 0;
        let nextBossScore = 200, yellowCards = 0, varUsed = false, isVAR = false, varTimer = 0, varPendingResume = false;
        let countrySelected = false;

        const countryTeams = {
            "BR": { primary: "#FFD700", secondary: "#008000", name: "BRAZIL" },
            "AR": { primary: "#87CEEB", secondary: "#FFFFFF", name: "ARGENTINA" },
            "FR": { primary: "#0000FF", secondary: "#FFFFFF", name: "FRANCE" },
            "DE": { primary: "#FFFFFF", secondary: "#000000", name: "GERMANY" },
            "IT": { primary: "#004BB3", secondary: "#FFFFFF", name: "ITALY" },
            "CA": { primary: "#FF0000", secondary: "#FFFFFF", name: "CANADA" }
        };
        let selectedTeam = countryTeams["BR"];

        const GROUND_Y = 280;
        const player = { x: 80, y: 220, w: 30, h: 60, dy: 0, jumpForce: 13, gravity: 0.7, grounded: false };
        const ball = { x: 100, y: 260, r: 10, isKicked: false, bounce: false };
        let obstacles = [], airObstacles = [];
        const bossRef = { x: 1000, y: 190, w: 30, h: 90, active: false };
        const goal = { x: 1200, y: 100, w: 60, h: 160, active: false };

        function updateLeaderboardUI() {
            const lb = document.getElementById("leaderboard");
            lb.innerHTML = "<b>LOCAL TOP RUNS:</b><br>" + 
                highscores.map((s, i) => `${i+1}. ${Math.floor(s)} pts`).join(" | ");
        }

        function selectCountry(code) {
            selectedTeam = countryTeams[code];
            countrySelected = true;
            document.getElementById("setupMenu").style.display = 'none';
            document.getElementById("gameUI").style.display = 'block';
            document.getElementById("teamLabel").innerText = "Team: " + selectedTeam.name;
            draw(); 
        }

        function triggerHaptic(type) {
            if (navigator.vibrate) {
                if (type === 'hit') navigator.vibrate(80);
                if (type === 'goal') navigator.vibrate([50, 30, 50]);
                if (type === 'red') navigator.vibrate(400);
            }
        }

        function spawnObject() {
            if (!gameStarted || isGameOver || isVAR || varPendingResume) return;
            if (score >= nextBossScore && !bossRef.active && !goal.active) {
                bossRef.active = true; bossRef.x = canvas.width + 100; return; 
            }
            const rand = Math.random();
            if (rand < 0.45) obstacles.push({ x: canvas.width, y: GROUND_Y - 40, w: 30, h: 40 });
            else if (rand < 0.75) airObstacles.push({ x: canvas.width, y: 130 + (Math.random() * 50), w: 30, h: 30, type: Math.random() > 0.5 ? "🐦" : "🍼" });
        }

        function drawStickman(x, y, color, isRef, frame) {
            const cycle = Math.sin(frame * 0.25); 
            const armCycle = Math.cos(frame * 0.25);
            ctx.strokeStyle = isRef ? "#000" : color;
            ctx.lineWidth = 4; ctx.lineCap = "round";
            ctx.fillStyle = "#FFDAB9";
            ctx.beginPath(); ctx.arc(x + 15, y + 5, 8, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.moveTo(x + 15, y + 13); ctx.lineTo(x + 15, y + 35); ctx.stroke();
            if (!isRef) { ctx.fillStyle = color; ctx.fillRect(x + 10, y + 13, 10, 20); }
            ctx.beginPath();
            ctx.moveTo(x + 15, y + 18); ctx.lineTo(x + 15 + (armCycle * 15), y + 30);
            ctx.moveTo(x + 15, y + 18); ctx.lineTo(x + 15 - (armCycle * 15), y + 30); ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x + 15, y + 35); ctx.lineTo(x + 15 + (cycle * 20), y + 55); 
            ctx.moveTo(x + 15, y + 35); ctx.lineTo(x + 15 - (cycle * 20), y + 55); ctx.stroke();
        }

        function drawCrowd(frame) {
            ctx.font = "20px Arial";
            for (let i = 0; i < canvas.width; i += 40) {
                const wave = Math.sin((frame * 0.1) + (i * 0.05)) * 10;
                ctx.fillText("👤", i, 60 + wave);
            }
        }

        function update() {
            if (!gameStarted || isGameOver || varPendingResume) return;
            if (isVAR) {
                varTimer--; if (varTimer <= 0) varPendingResume = true;
                draw(); requestAnimationFrame(update); return;
            }
            frameCount++;
            player.dy += player.gravity; player.y += player.dy;
            if (player.y + player.h > GROUND_Y) { player.y = GROUND_Y - player.h; player.dy = 0; player.grounded = true; }
            
            if (!ball.isKicked) { ball.x = player.x + 35; ball.y = GROUND_Y - 15; } 
            else {
                ball.x += ball.bounce ? -10 : 20;
                obstacles.forEach((obs, i) => {
                    if (ball.x > obs.x && ball.x < obs.x + obs.w && ball.y > obs.y) {
                        obstacles.splice(i, 1); ball.isKicked = false; score += 25; triggerHaptic('hit');
                    }
                });
                if (goal.active && ball.x > goal.x && ball.y < GROUND_Y) {
                    score += 500; goal.active = false; ball.isKicked = false; yellowCards = 0; 
                    nextBossScore += 600; triggerHaptic('goal');
                }
                if (bossRef.active && ball.x > bossRef.x && ball.x < bossRef.x + bossRef.w && ball.y > bossRef.y) ball.bounce = true;
                if (ball.x > canvas.width || ball.x < 0) { ball.isKicked = false; ball.bounce = false; }
            }

            if (bossRef.active) {
                bossRef.x -= (gameSpeed + 2);
                if (player.x < bossRef.x + bossRef.w && player.x + player.w > bossRef.x && player.y + player.h > bossRef.y) {
                    triggerHaptic('red');
                    if (!varUsed) { isVAR = true; varUsed = true; varTimer = 100; } else { endGame(); }
                }
                if (bossRef.x + bossRef.w < 0) { bossRef.active = false; goal.active = true; goal.x = canvas.width + 100; }
            }

            if (goal.active) goal.x -= gameSpeed;
            obstacles.forEach((obs, i) => {
                obs.x -= gameSpeed;
                if (player.x < obs.x + obs.w && player.x + player.w > obs.x && player.y + player.h > obs.y) {
                    obstacles.splice(i, 1); yellowCards++; triggerHaptic('hit');
                    if (yellowCards >= 2) { if (!varUsed) { isVAR = true; varUsed = true; varTimer = 100; } else { endGame(); } }
                }
                if (obs.x + obs.w < 0) obstacles.splice(i, 1);
            });

            airObstacles.forEach((obs, i) => {
                obs.x -= (gameSpeed + 2);
                if (player.x < obs.x + obs.w && player.x + player.w > obs.x && player.y < obs.y + obs.h && player.y + player.h > obs.y) {
                    airObstacles.splice(i, 1); yellowCards++; triggerHaptic('hit');
                    if (yellowCards >= 2) { if (!varUsed) { isVAR = true; varUsed = true; varTimer = 100; } else { endGame(); } }
                }
                if (obs.x + obs.w < 0) airObstacles.splice(i, 1);
            });

            score += 0.2; gameSpeed += 0.001;
            draw(); requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#1b5e20"; ctx.fillRect(0, GROUND_Y, canvas.width, 20);
            drawCrowd(frameCount);
            if (!countrySelected) return;

            drawStickman(player.x, player.y, selectedTeam.primary, false, player.grounded ? frameCount : 5);
            ctx.font = "20px Arial"; ctx.fillText("⚽", ball.x - 10, ball.y + 10);
            obstacles.forEach(obs => { ctx.fillStyle = "#FF5722"; ctx.beginPath(); ctx.moveTo(obs.x, obs.y + obs.h); ctx.lineTo(obs.x + obs.w/2, obs.y); ctx.lineTo(obs.x + obs.w, obs.y + obs.h); ctx.fill(); });
            airObstacles.forEach(obs => { ctx.font = "24px Arial"; ctx.fillText(obs.type, obs.x, obs.y + 20); });
            if (bossRef.active) { drawStickman(bossRef.x, bossRef.y, "#000", true, frameCount); ctx.fillStyle = "white"; ctx.font = "bold 10px Arial"; ctx.textAlign = "center"; ctx.fillText("REF", bossRef.x + 15, bossRef.y - 10); }
            if (goal.active) { ctx.strokeStyle = "white"; ctx.lineWidth = 4; ctx.strokeRect(goal.x, goal.y, goal.w, goal.h); }
            
            ctx.textAlign = "left"; ctx.fillStyle = "white"; ctx.font = "bold 18px Arial";
            ctx.fillText("SCORE: " + Math.floor(score), 10, 25);
            ctx.fillText("🏆: " + Math.floor(highscores[0]), 10, 50);
            if (yellowCards === 1) { ctx.fillStyle = "yellow"; ctx.fillRect(canvas.width - 40, 10, 20, 30); }
            
            if (isVAR) {
                ctx.fillStyle = "rgba(0,0,100,0.7)"; ctx.fillRect(0,0,canvas.width, canvas.height);
                ctx.fillStyle = "white"; ctx.textAlign = "center";
                if (varPendingResume) { ctx.font = "bold 20px Arial"; ctx.fillText("VAR: PLAY ON!", canvas.width/2, 140); ctx.fillText("TAP/PRESS UP TO RESUME", canvas.width/2, 180); }
                else { ctx.font = "bold 24px Arial"; ctx.fillText("VAR CHECKING...", canvas.width/2, 150); }
            }
            if (!gameStarted) { ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(0,0,canvas.width, canvas.height); ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.font = "20px Arial"; ctx.fillText("TAP OR PRESS UP TO START", canvas.width/2, 150); }
        }

        function endGame() {
            isGameOver = true;
            highscores.push(score);
            highscores.sort((a, b) => b - a);
            highscores = highscores.slice(0, 3);
            localStorage.setItem("strikerLeaderboard", JSON.stringify(highscores));
            alert("RED CARD! GAME OVER. Score: " + Math.floor(score));
            location.reload();
        }

        function handleInput(xPos) {
            if (!gameStarted && countrySelected) { gameStarted = true; update(); return; }
            if (varPendingResume) { 
                isVAR = false; varPendingResume = false; yellowCards = 0; 
                airObstacles = []; obstacles = []; bossRef.active = false; goal.active = false;
                update(); return;
            }
            if (xPos < window.innerWidth / 2) {
                if (player.grounded) { player.dy = -player.jumpForce; player.grounded = false; }
            } else {
                if (gameStarted && !ball.isKicked && !isVAR) ball.isKicked = true;
            }
        }

        window.addEventListener("touchstart", (e) => { e.preventDefault(); handleInput(e.touches[0].clientX); }, {passive: false});
        window.addEventListener("mousedown", (e) => { handleInput(e.clientX); });
        window.addEventListener("keydown", (e) => {
            if (e.key === "ArrowUp") handleInput(0);
            if (e.key === "ArrowRight") handleInput(window.innerWidth);
        });

        updateLeaderboardUI();
        setInterval(spawnObject, 900);
    </script>
</body>
</html>
